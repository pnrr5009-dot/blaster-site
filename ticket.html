<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تذكرة وساطة | Wasata Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05060b; color: white; font-family: sans-serif; overflow: hidden; }
        .message { margin-bottom: 15px; padding: 12px 18px; border-radius: 18px; max-width: 85%; position: relative; }
        .msg-admin { background: #1a1d2e; border: 1px solid rgba(255,255,255,0.05); align-self: flex-start; border-bottom-right-radius: 2px; }
        .msg-user { background: #eab308; color: black; align-self: flex-end; border-bottom-left-radius: 2px; font-weight: 600; }
        .admin-badge { background: #eab308; color: black; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; margin-left: 5px; vertical-align: middle; }
        .bg-dots { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(#ffffff08 1.5px, transparent 1.5px); background-size: 25px 25px; }
        /* أنيميشن إشعار الدفع */
        #paymentNotice { display: none; background: linear-gradient(to right, #eab30822, transparent); border-top: 1px solid #eab30844; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col h-screen">
    <div class="bg-dots"></div>

    <!-- Header -->
    <nav class="p-4 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="text-xl font-black text-yellow-500 cursor-pointer" onclick="location.href='index.html'">🛡️ وساطة</div>
            <div id="ticketID" class="text-[10px] bg-white/5 px-2 py-1 rounded border border-white/10 text-gray-400 font-mono">#16251</div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-left">
                <p class="text-[9px] text-gray-400 uppercase leading-none mb-1">حالة المعاملة</p>
                <span id="ticketStatus" class="text-[11px] text-yellow-500 font-bold px-2 py-1 bg-yellow-500/10 rounded-lg border border-yellow-500/20">جاري التحقق..</span>
            </div>
            <div class="bg-yellow-500 text-black px-4 py-1 rounded-xl text-xs font-black" id="uName">...</div>
        </div>
    </nav>

    <div class="flex-1 flex flex-col max-w-4xl mx-auto w-full p-4 overflow-hidden">
        <!-- Setup Form -->
        <div id="setupForm" class="bg-[#111218] p-8 rounded-[2.5rem] border border-white/10 mb-4 shadow-2xl relative">
            <h3 class="font-black text-3xl mb-6 text-center text-white">فتح تذكرة وساطة</h3>
            <div class="space-y-4">
                <div class="bg-black/50 p-4 rounded-2xl border border-white/5">
                    <label class="text-[10px] text-gray-500 block mb-2 uppercase">مبلغ المعاملة الأساسي (SAR)</label>
                    <input type="number" id="amount" value="500" class="w-full bg-transparent border-none text-2xl font-black outline-none text-yellow-500">
                </div>
            </div>
            <button onclick="startChat()" class="w-full mt-8 bg-yellow-500 text-black py-5 rounded-3xl font-black text-lg shadow-xl shadow-yellow-500/10 hover:scale-[1.02] transition active:scale-95">بدأ الشات مع الوسيط المعتمد</button>
        </div>

        <!-- Chat Area -->
        <div id="chatArea" class="hidden flex-1 flex flex-col bg-[#111218]/60 backdrop-blur-md rounded-[2.5rem] border border-white/5 overflow-hidden shadow-inner">
            <div id="messageList" class="flex-1 overflow-y-auto p-6 flex flex-col scroll-smooth">
                <div class="msg-admin message text-[11px] text-gray-500 italic">نظام: تم تخصيص الوسيط "Waseet_Security" لإدارة عملية التبادل.</div>
            </div>
            
            <!-- إشعار الدفع الرسمي -->
            <div id="paymentNotice" class="p-5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="p-3 bg-yellow-500 text-black rounded-2xl text-xl">💳</div>
                        <div>
                            <p class="text-sm font-black text-white">تنبيه: بانتظار إتمام الدفع</p>
                            <p class="text-[10px] text-gray-500">يجب وضع مبلغ الوساطة في الخزنة لتأمين حق الطرفين.</p>
                        </div>
                    </div>
                    <button onclick="location.href='payment.html'" class="bg-yellow-500 text-black px-8 py-3 rounded-2xl font-black text-xs hover:bg-yellow-400 transition">انتقال للدفع</button>
                </div>
            </div>

            <!-- إدخال النص -->
            <div class="p-4 bg-black/40 flex gap-3 border-t border-white/5">
                <input id="userMsg" type="text" placeholder="اكتب للوسيط هنا..." class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-sm outline-none focus:border-yellow-500 transition-all">
                <button onclick="sendMsg()" class="bg-yellow-500 text-black w-14 h-14 rounded-2xl flex items-center justify-center font-bold text-xl active:scale-90 transition">←</button>
            </div>
        </div>
    </div>

    <!-- كود الجافاسكريبت داخل الوسوم الصحيحة -->
    <script>
        // رابط الويب هوك الخاص بك لإرسال الرسائل لديسكورد فوراً (Global)
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1511676605993586688/8IXSL1WEEVcqCQAD49qytkBz3Edk7PBH-ODmM18FGH1PYoVYMeDqYtj5udkWcm7ybNL0";

        const session = JSON.parse(localStorage.getItem('wasata_session'));
        if(!session) location.href = 'login.html';

        function initTicket() {
            const uName = session.email.split('@')[0];
            document.getElementById('uName').innerText = uName;
            
            // تحقق إذا كان الشخص لديه تكت مفتوح أصلاً من قبل (حتى لو IP مختلف، طالما بنفس المتصفح/Session)
            if(localStorage.getItem('wasata_active_ticket')) {
                startChat(true);
            }
        }

        function startChat(isReturning = false) {
            document.getElementById('setupForm').classList.add('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            
            if(!isReturning) {
                localStorage.setItem('wasata_active_ticket', 'true');
                // أول رسالة ترحيب من السيستم
                setTimeout(() => {
                    receiveMsg("Waseet_Security", "أهلاً بك يا غالي. أنا الوسيط المسؤول عن هذه العملية. يرجى تأكيد المبلغ المطلوب ووسيلة التسليم.");
                }, 1500);

                // إرسال تنبيه لديسكورد
                notifyDiscord("🚀 تكت جديد تم فتحه!", `العميل: ${session.email}\nالمبلغ: ${document.getElementById('amount').value} SAR\nالرابط: ${window.location.href}`);
            }
        }

        function sendMsg() {
            const input = document.getElementById('userMsg');
            if(!input.value) return;
            const msg = input.value;
            
            // إظهار الرسالة في الشات
            const list = document.getElementById('messageList');
            const div = document.createElement('div');
            div.className = "msg-user message shadow-xl";
            div.innerText = msg;
            list.appendChild(div);
            
            // تخزين الرسالة ليراها الأدمن في لوحة التحكم (Local Storage Integration)
            const chatLog = JSON.parse(localStorage.getItem('admin_inbox') || '[]');
            chatLog.push({ user: session.email, msg: msg, time: new Date().toLocaleTimeString() });
            localStorage.setItem('admin_inbox', JSON.stringify(chatLog));

            // إرسال عالمي لديسكورد (ليصلك التنبيه أينما كنت)
            notifyDiscord(`💬 رسالة من ${session.email.split('@')[0]}`, msg);

            input.value = "";
            list.scrollTop = list.scrollHeight;
        }

        function receiveMsg(admin, text) {
            const list = document.getElementById('messageList');
            const div = document.createElement('div');
            div.className = "msg-admin message shadow-lg";
            div.innerHTML = `<span class="text-[10px] font-black text-yellow-500 block mb-1 uppercase tracking-tighter">${admin} <span class="admin-badge">VERIFIED</span></span> ${text}`;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        function notifyDiscord(title, desc) {
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: title,
                        description: desc,
                        color: 16762880,
                        timestamp: new Date().toISOString()
                    }]
                })
            });
        }

        // الاستماع لاستقبال ردود الأدمن من صفحة admin.html
        window.addEventListener('storage', (e) => {
            if(e.key === 'admin_instruction') {
                const data = JSON.parse(e.newValue);
                if(data.targetUser === session.email) {
                    if(data.msg && data.msg !== "طلب دفع مالي") receiveMsg("Waseet_Security", data.msg);
                    if(data.action === 'showPay') document.getElementById('paymentNotice').style.display = 'block';
                    if(data.status) document.getElementById('ticketStatus').innerText = data.status;
                }
            }
        });

        initTicket();
    </script>
</body>
</html>
