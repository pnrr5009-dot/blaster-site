<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تذكرة وساطة | Wasata Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #05060b; color: white; font-family: sans-serif; overflow: hidden; }
        .message { margin-bottom: 15px; padding: 12px 18px; border-radius: 20px; max-width: 80%; position: relative; }
        .msg-admin { background: #1a1d2e; border: 1px solid rgba(255,255,255,0.05); align-self: flex-start; border-bottom-right-radius: 2px; }
        .msg-user { background: #eab308; color: black; align-self: flex-end; border-bottom-left-radius: 2px; font-weight: 600; }
        .bg-dots { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(#ffffff08 1.5px, transparent 1.5px); background-size: 25px 25px; }
        #paymentNotice { display: none; background: linear-gradient(to right, #eab30822, transparent); border-top: 1px solid #eab30833; padding: 15px; }
    </style>
</head>
<body class="flex flex-col h-screen">
    <div class="bg-dots"></div>
    <nav class="p-4 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="text-xl font-black text-yellow-500 cursor-pointer" onclick="location.href='index.html'">🛡️ وساطة</div>
            <div class="text-[10px] bg-white/5 px-2 py-1 rounded border border-white/10 text-gray-400">#16251</div>
        </div>
        <div class="flex items-center gap-4">
            <div id="ticketStatus" class="text-[11px] text-yellow-500 font-bold px-2 py-1 bg-yellow-500/10 rounded-lg">جاري التحقق..</div>
            <div id="uName" class="bg-yellow-500 text-black px-4 py-1 rounded-xl text-xs font-black shadow-lg">...</div>
        </div>
    </nav>

    <div class="flex-1 flex flex-col max-w-4xl mx-auto w-full p-4 overflow-hidden">
        <div id="setupForm" class="bg-[#111218] p-8 rounded-[2.5rem] border border-white/10 mb-4 shadow-2xl">
            <h3 class="font-black text-2xl mb-6 text-center">فتح طلب وساطة جديد</h3>
            <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center mb-6">
                <label class="text-xs text-gray-500 block mb-2">قيمة المعاملة (SAR)</label>
                <input type="number" id="amount" value="500" class="w-full bg-transparent border-none text-2xl font-black outline-none text-center text-yellow-500">
            </div>
            <button onclick="startChat()" class="w-full bg-yellow-500 text-black py-5 rounded-2xl font-black text-lg shadow-lg">بدأ المحادثة مع الوسيط</button>
        </div>

        <div id="chatArea" class="hidden flex-1 flex flex-col bg-[#111218]/50 rounded-[2rem] border border-white/5 overflow-hidden backdrop-blur-md">
            <div id="messageList" class="flex-1 overflow-y-auto p-6 flex flex-col scroll-smooth"></div>
            <div id="paymentNotice" class="flex justify-between items-center">
                <p class="text-xs text-yellow-500 font-bold">يرجى دفع عربون الوساطة:</p>
                <button onclick="location.href='payment.html'" class="bg-yellow-500 text-black px-6 py-2 rounded-xl font-black text-xs">دفع الآن 💳</button>
            </div>
            <div class="p-4 bg-black/40 flex gap-3">
                <input id="userMsg" type="text" placeholder="اكتب للوسيط هنا..." class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-sm outline-none">
                <button onclick="sendMsg()" class="bg-yellow-500 text-black w-14 h-14 rounded-2xl font-bold">←</button>
            </div>
        </div>
    </div>

    <script>
        // ضع رابط الـ Firebase الخاص بك من الصورة
        const firebaseConfig = { databaseURL: "https://wasata-af6ac-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const session = JSON.parse(localStorage.getItem('wasata_session'));
        if(!session) location.href='login.html';
        const uEmailKey = session.email.replace(/\./g, '_');

        function init() {
            document.getElementById('uName').innerText = session.email.split('@')[0];
            if(localStorage.getItem('wasata_ticket_active')) startChat(true);
            
            db.ref('tickets/' + uEmailKey).on('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                if(data.status) document.getElementById('ticketStatus').innerText = data.status;
                if(data.action === 'showPay') document.getElementById('paymentNotice').style.display = 'flex';
                
                const list = document.getElementById('messageList');
                list.innerHTML = "";
                if(data.messages) {
                    Object.values(data.messages).forEach(m => {
                        const div = document.createElement('div');
                        div.className = m.sender === 'admin' ? "msg-admin message shadow-lg" : "msg-user message shadow-xl";
                        div.innerHTML = m.sender === 'admin' ? `<span class="text-[10px] font-black text-yellow-500 block mb-1 uppercase tracking-widest">VERIFIED MEDIATOR</span> ${m.text}` : m.text;
                        list.appendChild(div);
                    });
                    list.scrollTop = list.scrollHeight;
                }
            });
        }

        function startChat(isReturning = false) {
            document.getElementById('setupForm').classList.add('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            if(!isReturning) {
                localStorage.setItem('wasata_ticket_active', 'true');
                db.ref('tickets/' + uEmailKey).update({ 
                    userEmail: session.email,
                    status: 'بانتظار مراجعة الوسيط',
                    lastActive: Date.now()
                });
                sendMsg("🚀 تكت جديد مفتوح: العميل ينتظر المحادثة.");
            }
        }

        function sendMsg(customText = null) {
            const input = document.getElementById('userMsg');
            const text = customText || input.value;
            if(!text) return;
            db.ref('tickets/' + uEmailKey + '/messages').push({ text: text, sender: 'user', time: new Date().toLocaleTimeString() });
            input.value = "";
        }

        init();
    </script>
</body>
</html>
