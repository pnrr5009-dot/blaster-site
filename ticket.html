<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تذكرة وساطة | Wasata Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05060b; color: white; font-family: sans-serif; overflow: hidden; }
        .message { margin-bottom: 15px; padding: 12px 18px; border-radius: 18px; max-width: 85%; position: relative; }
        .msg-admin { background: #1a1d2e; border: 1px solid rgba(255,255,255,0.05); align-self: flex-start; border-bottom-right-radius: 2px; }
        .msg-user { background: #eab308; color: black; align-self: flex-end; border-bottom-left-radius: 2px; font-weight: 600; }
        .bg-dots { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(#ffffff08 1.5px, transparent 1.5px); background-size: 25px 25px; }
        #paymentNotice { display: none; background: linear-gradient(to right, #eab30822, transparent); padding: 15px; border-top: 1px solid #eab30833; }
    </style>
</head>
<body class="flex flex-col h-screen">
    <div class="bg-dots"></div>

    <nav class="p-4 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="text-xl font-black text-yellow-500 cursor-pointer" onclick="location.href='index.html'">🛡️ وساطة</div>
            <div id="ticketID" class="text-[10px] bg-white/5 px-2 py-1 rounded border border-white/10 text-gray-400 opacity-50">#16251</div>
        </div>
        <div class="bg-yellow-500 text-black px-4 py-1 rounded-xl text-xs font-black shadow-lg" id="uName">...</div>
    </nav>

    <div class="flex-1 flex flex-col max-w-4xl mx-auto w-full p-4 overflow-hidden">
        <!-- فورم البداية -->
        <div id="setupForm" class="bg-[#111218] p-8 rounded-[2.5rem] border border-white/10 mb-4 shadow-2xl">
            <h3 class="font-black text-2xl mb-6 text-center">فتح طلب وساطة جديد</h3>
            <div class="space-y-4">
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                    <label class="text-xs text-gray-500 block mb-2 text-right">قيمة المعاملة (SAR)</label>
                    <input type="number" id="amount" value="500" class="w-full bg-transparent border-none text-xl font-black outline-none text-center">
                </div>
            </div>
            <button onclick="startChat()" class="w-full mt-8 bg-yellow-500 text-black py-5 rounded-2xl font-black text-lg shadow-lg hover:scale-[1.02] transition">بدأ المحادثة مع الوسيط</button>
        </div>

        <!-- شاشة الشات -->
        <div id="chatArea" class="hidden flex-1 flex flex-col bg-[#111218]/50 rounded-[2rem] border border-white/5 overflow-hidden backdrop-blur-md">
            <div id="messageList" class="flex-1 overflow-y-auto p-6 flex flex-col scroll-smooth">
                <div class="msg-admin message uppercase text-[10px] text-gray-500">نظام: تم ربطك بالوسيط المعتمد.</div>
            </div>
            
            <div id="paymentNotice">
                <div class="flex items-center justify-between">
                    <p class="text-xs text-yellow-500 font-bold">يرجى إتمام عربون الوساطة للدفع:</p>
                    <button onclick="location.href='payment.html'" class="bg-yellow-500 text-black px-6 py-2 rounded-xl font-black text-xs">دفع الآن</button>
                </div>
            </div>

            <div class="p-4 bg-black/40 flex gap-3">
                <input id="userMsg" type="text" placeholder="اكتب رسالتك للوسيط..." class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-3 text-sm outline-none">
                <button onclick="sendMsg()" class="bg-yellow-500 text-black w-12 h-12 rounded-2xl flex items-center justify-center font-bold">←</button>
            </div>
        </div>
    </div>

    <script>
        // ضع رابط الويب هوك الخاص بك هنا
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1511676605993586688/8IXSL1WEEVcqCQAD49qytkBz3Edk7PBH-ODmM18FGH1PYoVYMeDqYtj5udkWcm7ybNL0";
        
        const session = JSON.parse(localStorage.getItem('wasata_session'));
        if(!session) location.href='login.html';

        function init() {
            document.getElementById('uName').innerText = session.email.split('@')[0];
            if(localStorage.getItem('wasata_ticket_active')) {
                document.getElementById('setupForm').classList.add('hidden');
                document.getElementById('chatArea').classList.remove('hidden');
            }
        }

        function startChat() {
            localStorage.setItem('wasata_ticket_active', 'true');
            document.getElementById('setupForm').classList.add('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            
            // إرسال تنبيه لديسكورد أن شخصاً فتح تكت
            notifyDiscord("🎫 تكت جديد!", `المستخدم: ${session.email}\nالمبلغ: ${document.getElementById('amount').value} SAR`);
            
            receiveMsg("Waseet_Security", "أهلاً بك، أنا الوسيط فوزي. بانتظار تفاصيل المعاملة.");
        }

        function sendMsg() {
            const input = document.getElementById('userMsg');
            if(!input.value) return;
            
            const list = document.getElementById('messageList');
            const div = document.createElement('div');
            div.className = "msg-user message shadow-xl";
            div.innerText = input.value;
            list.appendChild(div);
            
            // تخزين الرسالة للأدمن (Local)
            const chatLog = JSON.parse(localStorage.getItem('admin_inbox') || '[]');
            chatLog.push({ user: session.email, msg: input.value, time: new Date().toLocaleTimeString() });
            localStorage.setItem('admin_inbox', JSON.stringify(chatLog));

            // إرسال الرسالة لديسكورد (Global) لكي تراها من أي جهاز
            notifyDiscord(`💬 رسالة من ${session.email.split('@')[0]}`, input.value);

            input.value = "";
            list.scrollTop = list.scrollHeight;
        }

        function receiveMsg(admin, text) {
            const list = document.getElementById('messageList');
            const div = document.createElement('div');
            div.className = "msg-admin message shadow-lg";
            div.innerHTML = `<span class="text-[10px] font-black text-yellow-500 block mb-1 uppercase tracking-tighter">${admin} [Verified]</span> ${text}`;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        function notifyDiscord(title, msg) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: title,
                        description: msg,
                        color: 16762880,
                        timestamp: new Date().toISOString()
                    }]
                })
            });
        }

        // الاستماع لردودك كأدمن من صفحة admin.html
        window.addEventListener('storage', (e) => {
            if(e.key === 'admin_instruction') {
                const data = JSON.parse(e.newValue);
                if(data.targetUser === session.email) {
                    if(data.msg && data.msg !== "طلب دفع مالي") receiveMsg("Waseet_Security", data.msg);
                    if(data.action === 'showPay') document.getElementById('paymentNotice').style.display = 'block';
                }
            }
        });

        init();
    </script>
</body>
</html>
