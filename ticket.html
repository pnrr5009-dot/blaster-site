<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تذكرة وساطة | Wasata Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #05060b; color: white; font-family: sans-serif; overflow: hidden; }
        .message { margin-bottom: 12px; padding: 10px 15px; border-radius: 18px; max-width: 80%; }
        .msg-admin { background: #1a1d2e; align-self: flex-start; border-right: 3px solid #eab308; }
        .msg-user { background: #eab308; color: black; align-self: flex-end; font-weight: bold; }
        #paymentNotice { display: none; background: #eab30811; border-top: 1px solid #eab30833; padding: 12px; }
    </style>
</head>
<body class="flex flex-col h-screen">
    <nav class="p-4 flex justify-between items-center bg-black/40 border-b border-white/5 shadow-2xl">
        <div class="text-xl font-black text-yellow-500 cursor-pointer" onclick="location.href='index.html'">🛡️ وساطة</div>
        <div class="flex items-center gap-4">
            <div id="ticketStatus" class="text-[10px] text-yellow-500 font-bold px-2 py-1 bg-yellow-500/10 rounded">جاري التحقق..</div>
            <div id="uName" class="bg-yellow-500 text-black px-3 py-1 rounded-lg text-xs font-black">...</div>
        </div>
    </nav>

    <div class="flex-1 flex flex-col max-w-4xl mx-auto w-full p-4 overflow-hidden">
        <!-- Setup Form -->
        <div id="setupForm" class="bg-[#111218] p-8 rounded-[2rem] border border-white/10 shadow-2xl text-center">
            <h3 class="text-2xl font-black mb-6">فتح طلب وساطة جديد</h3>
            <div class="bg-black/50 p-4 rounded-xl border border-white/5 mb-6">
                <p class="text-[10px] text-gray-500 mb-2 uppercase">مبلغ المعاملة (SAR)</p>
                <input type="number" id="amount" value="500" class="bg-transparent text-2xl font-black outline-none text-yellow-500 text-center">
            </div>
            <button onclick="startChat()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black text-lg">بدأ المحادثة</button>
        </div>

        <!-- Chat Area -->
        <div id="chatArea" class="hidden flex-1 flex flex-col bg-[#111218]/50 rounded-[2rem] border border-white/5 overflow-hidden">
            <div id="messageList" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3"></div>
            
            <div id="paymentNotice" class="flex justify-between items-center">
                <p class="text-xs text-yellow-500 font-bold">يرجى دفع عربون الوساطة:</p>
                <button onclick="location.href='payment.html'" class="bg-yellow-500 text-black px-5 py-2 rounded-lg font-black text-xs">دفع الآن</button>
            </div>

            <div class="p-4 bg-black/40 flex gap-2">
                <input id="userMsg" type="text" placeholder="اكتب للوسيط هنا..." class="flex-1 bg-white/5 rounded-xl px-4 py-3 outline-none focus:border-yellow-500 border border-transparent">
                <button onclick="sendMsg()" class="bg-yellow-500 text-black px-5 rounded-xl font-bold">←</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://wasata-af6ac-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const session = JSON.parse(localStorage.getItem('wasata_session'));
        if(!session) location.href='login.html';
        const uEmailKey = session.email.replace(/\./g, '_');

        function init() {
            document.getElementById('uName').innerText = session.email.split('@')[0];
            if(localStorage.getItem('wasata_ticket_active')) startChat(true);
            
            // مراقبة التغيرات
            db.ref('tickets/' + uEmailKey).on('value', (snap) => {
                const data = snap.val();
                if(!data) return;
                if(data.status) document.getElementById('ticketStatus').innerText = data.status;
                if(data.action === 'showPay') document.getElementById('paymentNotice').style.display = 'flex';
                
                const list = document.getElementById('messageList');
                list.innerHTML = "";
                if(data.messages) {
                    Object.values(data.messages).forEach(m => {
                        const div = document.createElement('div');
                        div.className = m.sender === 'admin' ? "msg-admin message shadow-lg" : "msg-user message shadow-xl";
                        div.innerHTML = m.sender === 'admin' ? `<span class="text-[9px] font-black text-yellow-500 block mb-1 uppercase">VERIFIED MODERATOR</span> ${m.text}` : m.text;
                        list.appendChild(div);
                    });
                    list.scrollTop = list.scrollHeight;
                }
            });
        }

        function startChat(isReturning = false) {
            document.getElementById('setupForm').classList.add('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            if(!isReturning) {
                localStorage.setItem('wasata_ticket_active', 'true');
                // إنشاء التذكرة فوراً لكي تظهر في لوحة الأدمن
                db.ref('tickets/' + uEmailKey).set({
                    userEmail: session.email,
                    status: 'بانتظار الوسيط',
                    lastActive: Date.now()
                });
                sendMsg("🚀 تكت جديد: العميل بانتظارك.");
            }
        }

        function sendMsg(customText = null) {
            const input = document.getElementById('userMsg');
            const text = customText || input.value;
            if(!text) return;
            db.ref('tickets/' + uEmailKey + '/messages').push({ text: text, sender: 'user', time: new Date().toLocaleTimeString() });
            input.value = "";
        }

        init();
    </script>
</body>
</html>
