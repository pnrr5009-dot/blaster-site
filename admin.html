<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Wasata Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0a0b10; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .ticket-item { transition: 0.2s; background: rgba(255,255,255,0.02); margin-bottom: 8px; border-radius: 12px; cursor: pointer; border-right: 4px solid transparent; }
        .ticket-item.active { background: #1a1d2e; border-right-color: #eab308; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="flex flex-col">
    <nav class="bg-[#111218] p-4 border-b border-white/5 flex justify-between items-center shadow-2xl">
        <h1 class="text-xl font-black text-yellow-500">لوحة وساطة العالمية 🌍</h1>
        <button onclick="location.href='index.html'" class="text-xs bg-red-500/10 text-red-500 px-4 py-1 rounded-xl">خروج</button>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 bg-[#111218] border-l border-white/5 p-4 overflow-y-auto" id="ticketList">
            <h3 class="text-[10px] text-gray-500 font-bold uppercase mb-4 px-2">التذاكر النشطة</h3>
        </aside>

        <main class="flex-1 flex flex-col bg-[#05060b]">
            <div id="chatArea" class="hidden flex-1 flex flex-col overflow-hidden">
                <div class="p-4 bg-white/5 border-b border-white/5 flex justify-between items-center">
                    <span id="activeUser" class="font-black text-yellow-500 font-mono">@user</span>
                    <select id="admStatus" onchange="updateTicket('status')" class="bg-black text-[10px] p-2 rounded-lg text-yellow-500 border border-white/10">
                        <option value="جاري المراجعة">جاري المراجعة</option>
                        <option value="انتظار التحويل">انتظار التحويل</option>
                        <option value="تم بنجاح ✓">إغلاق بنجاح</option>
                    </select>
                </div>
                <div id="messageDisplay" class="flex-1 overflow-y-auto p-6 flex flex-col gap-3"></div>
                <div class="p-4 bg-[#111218] border-t border-white/5 flex gap-2">
                    <input id="adminMsg" type="text" placeholder="اكتب ردك..." class="flex-1 bg-black border border-white/10 rounded-xl px-4 py-3 outline-none">
                    <button onclick="updateTicket('send')" class="bg-yellow-500 text-black px-6 rounded-xl font-black">إرسال</button>
                    <button onclick="updateTicket('pay')" class="bg-yellow-500/20 text-yellow-500 px-4 rounded-xl font-black text-xs">طلب دفع</button>
                </div>
            </div>
            <div id="noTicket" class="flex-1 flex items-center justify-center opacity-20 font-bold">يرجى اختيار تذكرة من القائمة</div>
        </main>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://wasata-af6ac-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedKey = null;

        // سحب قائمة التذاكر بشكل دائم
        db.ref('tickets').on('value', (snapshot) => {
            const list = document.getElementById('ticketList');
            list.innerHTML = '<h3 class="text-[10px] text-gray-500 font-bold uppercase mb-4 px-2">التذاكر النشطة</h3>';
            snapshot.forEach((child) => {
                const data = child.val();
                const key = child.key;
                const div = document.createElement('div');
                div.className = `ticket-item p-4 ${selectedKey === key ? 'active' : ''}`;
                div.onclick = () => selectUser(key, data);
                div.innerHTML = `<div class="font-black text-xs text-white">@${data.userEmail.split('@')[0]}</div><p class="text-[10px] text-gray-500">${data.status}</p>`;
                list.appendChild(div);
            });
        });

        function selectUser(key, data) {
            selectedKey = key;
            document.getElementById('noTicket').style.display = 'none';
            document.getElementById('chatArea').classList.remove('hidden');
            document.getElementById('activeUser').innerText = "@" + data.userEmail.split('@')[0];
            
            // مراقبة الرسائل للتذكرة المختارة
            db.ref('tickets/' + selectedKey + '/messages').on('value', (snap) => {
                const display = document.getElementById('messageDisplay');
                display.innerHTML = "";
                snap.forEach((m) => {
                    const msg = m.val();
                    const div = document.createElement('div');
                    div.className = `p-3 rounded-2xl max-w-[85%] ${msg.sender === 'admin' ? 'bg-yellow-500/10 mr-auto' : 'bg-white/5 ml-auto'}`;
                    div.innerHTML = `<p class="text-sm">${msg.text}</p>`;
                    display.appendChild(div);
                });
                display.scrollTop = display.scrollHeight;
            });
        }

        function updateTicket(type) {
            if(!selectedKey) return;
            const ref = db.ref('tickets/' + selectedKey);
            if(type === 'send') {
                const txt = document.getElementById('adminMsg').value;
                if(txt) ref.child('messages').push({ text: txt, sender: 'admin', time: new Date().toLocaleTimeString() });
                document.getElementById('adminMsg').value = "";
            } else if(type === 'status') {
                ref.update({ status: document.getElementById('admStatus').value });
            } else if(type === 'pay') {
                ref.update({ action: 'showPay' });
                alert("تم إرسال طلب الدفع");
            }
        }
    </script>
</body>
</html>
