<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة التذاكر | Wasata Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0b10; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .ticket-item { transition: 0.2s; border-right: 4px solid transparent; }
        .ticket-item.active { background: #1a1d2e; border-right-color: #eab308; }
        .chat-area { display: none; }
        .chat-area.active { display: flex; }
    </style>
</head>
<body class="flex flex-col">
    <!-- Header -->
    <div class="bg-[#111218] p-4 border-b border-white/5 flex justify-between items-center">
        <h1 class="text-xl font-black text-yellow-500">لوحة إشراف الوسيط 🛡️</h1>
        <div class="flex items-center gap-4">
            <span class="text-[10px] text-green-500 font-bold">LIVE MODE Active</span>
            <button onclick="location.href='index.html'" class="text-xs bg-white/5 px-4 py-1 rounded-lg">خروج</button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar: قائمة التذاكر -->
        <div class="w-80 bg-[#111218]/50 border-l border-white/5 flex flex-col">
            <div class="p-4 border-b border-white/5 text-xs font-bold text-gray-500 uppercase tracking-widest">التذاكر النشطة</div>
            <div id="ticketList" class="flex-1 overflow-y-auto">
                <!-- التذاكر بتنزل هنا -->
            </div>
        </div>

        <!-- Main: المحادثة والتحكم -->
        <div class="flex-1 flex flex-col bg-black/20">
            <!-- وجهة المحادثة (تظهر عند اختيار تذكرة) -->
            <div id="noTicket" class="flex-1 flex items-center justify-center text-gray-600 font-bold">
                يرجى اختيار تذكرة من القائمة الجانبية للبدء
            </div>

            <div id="chatInterface" class="chat-area flex-1 flex-col overflow-hidden">
                <!-- شريط معلومات التذكرة المختارة -->
                <div class="p-4 bg-white/5 border-b border-white/5 flex justify-between items-center">
                    <div>
                        <span id="activeTicketID" class="font-black text-yellow-500">#WS-0000</span>
                        <span id="activeUser" class="text-xs text-gray-400 mr-2">@user</span>
                    </div>
                    <select id="statusSelect" onchange="updateStatus()" class="bg-black text-xs p-2 rounded-lg border border-white/10 outline-none">
                        <option value="جاري المراجعة">جاري المراجعة</option>
                        <option value="انتظار التحويل">انتظار التحويل</option>
                        <option value="تم بنجاح ✓">إغلاق وتأكيد بنجاح</option>
                    </select>
                </div>

                <!-- رسائل التذكرة المحددة -->
                <div id="messageDisplay" class="flex-1 overflow-y-auto p-6 space-y-4 bg-black/40">
                    <!-- رسائل الشات تظهر هنا -->
                </div>

                <!-- صندوق الرد السريع -->
                <div class="p-4 bg-[#111218] border-t border-white/5">
                    <div class="flex gap-2 mb-3">
                        <button onclick="quickReply('أهلاً بك، أنا الوسيط فوزي. هل لديك تفاصيل بخصوص المعاملة؟')" class="text-[10px] bg-white/5 px-3 py-1 rounded-full border border-white/5 hover:bg-white/10">ترحيب</button>
                        <button onclick="quickReply('تمام، قمت بمراجعة البيانات. انزل أسفل الصفحة واضغط انتقال للدفع.')" class="text-[10px] bg-white/5 px-3 py-1 rounded-full border border-white/5 hover:bg-white/10">طلب دفع</button>
                        <button onclick="adminAction('pay')" class="text-[10px] bg-yellow-500 text-black px-3 py-1 rounded-full font-bold">إرسال طلب دفع مالي 💳</button>
                    </div>
                    <div class="flex gap-2">
                        <input id="adminMsg" type="text" placeholder="اكتب ردك الرسمي للعميل هنا..." class="flex-1 bg-black border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-yellow-500">
                        <button onclick="adminAction('send')" class="bg-white/10 px-6 rounded-xl font-bold">إرسال</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTicket = null;

        // تحديث قائمة التذاكر من الـ localStorage
        function loadTickets() {
            const inbox = JSON.parse(localStorage.getItem('admin_inbox') || '[]');
            const list = document.getElementById('ticketList');
            
            // تجميع التذاكر الفريدة (بناءً على اليوزر حالياً)
            const users = [...new Set(inbox.map(item => item.user))];
            
            list.innerHTML = "";
            users.forEach(user => {
                const lastMsg = inbox.filter(i => i.user === user).pop();
                const div = document.createElement('div');
                div.className = `ticket-item p-4 cursor-pointer hover:bg-white/5 ${currentTicket === user ? 'active' : ''}`;
                div.onclick = () => selectTicket(user);
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-sm">@${user.split('@')[0]}</span>
                        <span class="text-[9px] text-gray-600">${lastMsg.time}</span>
                    </div>
                    <p class="text-[11px] text-gray-500 truncate">${lastMsg.msg}</p>
                `;
                list.appendChild(div);
            });
        }

        function selectTicket(user) {
            currentTicket = user;
            document.getElementById('noTicket').style.display = 'none';
            document.getElementById('chatInterface').classList.add('active');
            document.getElementById('activeUser').innerText = `@${user}`;
            document.getElementById('activeTicketID').innerText = `#WS-${Math.abs(user.hashCode()).toString().substring(0,6)}`;
            renderMessages();
            loadTickets(); // لتحديث الـ active class
        }

        function renderMessages() {
            if(!currentTicket) return;
            const inbox = JSON.parse(localStorage.getItem('admin_inbox') || '[]');
            const messages = inbox.filter(i => i.user === currentTicket);
            const display = document.getElementById('messageDisplay');
            display.innerHTML = "";
            
            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = "bg-white/5 p-3 rounded-2xl max-w-[80%] border border-white/5";
                div.innerHTML = `<p class="text-sm">${m.msg}</p><span class="text-[9px] text-gray-600 block mt-1">${m.time}</span>`;
                display.appendChild(div);
            });
            display.scrollTop = display.scrollHeight;
        }

        function adminAction(type) {
            const msgInput = document.getElementById('adminMsg');
            const msg = msgInput.value;
            const status = document.getElementById('statusSelect').value;
            
            if(!currentTicket) return alert("اختر تذكرة أولاً");
            if(type === 'send' && !msg) return;

            const payload = {
                targetUser: currentTicket,
                msg: msg || "طلب دفع مالي",
                status: status,
                action: type === 'pay' ? 'showPay' : 'none'
            };

            localStorage.setItem('admin_instruction', JSON.stringify(payload));
            msgInput.value = "";
            alert("تم إرسال التعليمات للتذكرة");
        }

        function quickReply(text) {
            document.getElementById('adminMsg').value = text;
        }

        function updateStatus() {
            if(currentTicket) adminAction('status_only');
        }

        // تحويل الاسم لرقم تذكرة ثابت
        String.prototype.hashCode = function() {
            var hash = 0;
            for (var i = 0; i < this.length; i++) {
                hash = ((hash << 5) - hash) + this.charCodeAt(i);
                hash |= 0;
            }
            return hash;
        };

        setInterval(() => {
            loadTickets();
            if(currentTicket) renderMessages();
        }, 1500);
    </script>
</body>
</html>
