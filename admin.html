<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة التذاكر | Wasata Admin Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0b10; color: white; font-family: sans-serif; overflow: hidden; }
        .ticket-item { transition: 0.2s; border-right: 4px solid transparent; background: rgba(255,255,255,0.02); margin-bottom: 8px; border-radius: 12px; }
        .ticket-item.active { background: #1a1d2e; border-right-color: #eab308; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen">
    <nav class="bg-[#111218] p-4 border-b border-white/5 flex justify-between items-center shadow-2xl">
        <h1 class="text-xl font-black text-yellow-500">لوحة إشراف الوسيط 🛡️</h1>
        <button onclick="location.href='index.html'" class="text-xs bg-red-500/10 text-red-500 px-4 py-2 rounded-xl border border-red-500/20">خروج</button>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <!-- القائمة الجانبية للتذاكر -->
        <aside class="w-80 bg-[#111218]/80 border-l border-white/5 p-4 overflow-y-auto">
            <h3 class="text-[10px] text-gray-500 font-black uppercase mb-4 tracking-widest">التذاكر النشطة</h3>
            <div id="ticketList" class="space-y-2"></div>
        </aside>

        <!-- الشات الرئيسي -->
        <main class="flex-1 flex flex-col bg-[#05060b]">
            <div id="noTicket" class="flex-1 flex flex-col items-center justify-center opacity-20">
                <p class="font-bold">يرجى اختيار تذكرة لبدء المراقبة</p>
            </div>

            <div id="chatInterface" class="hidden flex-1 flex flex-col overflow-hidden">
                <div class="p-4 bg-[#111218] border-b border-white/5 flex justify-between items-center">
                    <div>
                        <span id="activeTicketID" class="font-black text-yellow-500">#WS-16251</span>
                        <span id="activeUser" class="text-xs text-gray-500 block">@user</span>
                    </div>
                </div>
                <div id="messageDisplay" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
                
                <div class="p-4 bg-[#111218] border-t border-white/5">
                    <div class="flex gap-2 mb-3">
                        <button onclick="quickReply('أهلاً بك، معك الوسيط فوزي لمراجعة طلبك.')" class="text-[9px] bg-white/5 px-3 py-1.5 rounded-lg border border-white/10">ترحيب</button>
                        <button onclick="adminAction('pay')" class="text-[9px] bg-yellow-500 text-black px-3 py-1.5 rounded-lg font-bold">طلب دفع مالي 💳</button>
                    </div>
                    <div class="flex gap-2">
                        <input id="adminMsg" type="text" placeholder="اكتب ردك هنا..." class="flex-1 bg-black border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-yellow-500">
                        <button onclick="adminAction('send')" class="bg-yellow-500 text-black px-8 rounded-xl font-black">إرسال</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentTicketUser = null;

        function loadTickets() {
            const inbox = JSON.parse(localStorage.getItem('admin_inbox') || '[]');
            const list = document.getElementById('ticketList');
            const users = [...new Set(inbox.map(item => item.user))];
            
            list.innerHTML = "";
            users.forEach(user => {
                const userMsgs = inbox.filter(i => i.user === user);
                const lastMsg = userMsgs[userMsgs.length - 1];
                const div = document.createElement('div');
                div.className = `ticket-item p-4 cursor-pointer ${currentTicketUser === user ? 'active' : ''}`;
                div.onclick = () => selectTicket(user);
                div.innerHTML = `<div class="flex justify-between font-black text-xs text-white">@${user.split('@')[0]}<span class="text-[8px] text-gray-600">${lastMsg.time}</span></div><p class="text-[10px] text-gray-500 truncate">${lastMsg.msg}</p>`;
                list.appendChild(div);
            });
        }

        function selectTicket(user) {
            currentTicketUser = user;
            document.getElementById('noTicket').classList.add('hidden');
            document.getElementById('chatInterface').classList.remove('hidden');
            document.getElementById('activeUser').innerText = `@${user}`;
            renderMessages();
            loadTickets();
        }

        function renderMessages() {
            const inbox = JSON.parse(localStorage.getItem('admin_inbox') || '[]');
            const messages = inbox.filter(i => i.user === currentTicketUser);
            const display = document.getElementById('messageDisplay');
            display.innerHTML = "";
            messages.forEach(m => {
                const div = document.createElement('div');
                div.className = "p-3 bg-white/5 rounded-2xl max-w-[90%] border border-white/5 mr-auto";
                div.innerHTML = `<p class="text-sm">${m.msg}</p><span class="text-[8px] text-gray-600">${m.time}</span>`;
                display.appendChild(div);
            });
            display.scrollTop = display.scrollHeight;
        }

        function adminAction(type) {
            const msgInput = document.getElementById('adminMsg');
            const payload = { targetUser: currentTicketUser, msg: msgInput.value, action: type === 'pay' ? 'showPay' : 'none', time: Date.now() };
            localStorage.setItem('admin_instruction', JSON.stringify(payload));
            msgInput.value = "";
            alert("تم الإرسال!");
        }

        function quickReply(txt) { document.getElementById('adminMsg').value = txt; }
        
        setInterval(() => { loadTickets(); if(currentTicketUser) renderMessages(); }, 1500);
        
        const session = JSON.parse(localStorage.getItem('wasata_session'));
        if(!session || session.role !== 'admin') location.href = 'index.html';
    </script>
</body>
</html>
