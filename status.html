<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسليم المنتج | وساطة</title>
    <style>
        body { background: #0a0b10; color: white; text-align: center; padding-top: 100px; font-family: sans-serif; }
        .loader { border: 6px solid #161b22; border-top: 6px solid #ffcc00; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: 0 auto 30px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .btn-back { display: none; background: #ffcc00; color: black; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="msg">جاري تجهيز محتويات المنتج...</h2>
    <p id="sub">يرجى الانتظار، لا تقم بإغلاق الصفحة لضمان استلام الكود الخاص بك.</p>
    <a href="index.html" id="btn" class="btn-back">الرجوع للرئيسية</a>

    <script>
        setTimeout(() => {
            document.getElementById('msg').innerText = "تم تأكيد الدفع بنجاح ✅";
            document.getElementById('sub').innerText = "تم إرسال كود المنتج إلى بريدك الإلكتروني المسجل لدينا. يرجى التحقق من صندوق الوارد أو الـ Spam.";
            document.getElementById('btn').style.display = 'inline-block';
            document.querySelector('.loader').style.display = 'none';
        }, 5000);
    </script>
</body>
</html>
