<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>وساطة | Wasata Elite v10</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background: #05060b; color: white; font-family: sans-serif; overflow-x: hidden; margin: 0; scroll-behavior: smooth; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; }
        .bg-dots { position: fixed; inset: 0; z-index: -2; background-image: radial-gradient(#ffffff08 1.5px, transparent 1.5px); background-size: 25px 25px; }

        /* تعديلات القائمة المنسدلة - تفتح لليسار */
        .dropdown-menu { 
            display: none; position: absolute; top: 120%; left: 0; 
            background: #111218; border: 1px solid rgba(234, 179, 8, 0.2); 
            border-radius: 18px; padding: 10px; min-width: 220px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); z-index: 100;
        }
        .user-nav:hover .dropdown-menu { display: block; }

        /* الرصيد المركزي */
        .wallet-center-card {
            background: linear-gradient(180deg, rgba(234,179,8,0.05) 0%, rgba(0,0,0,0.8) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(25px);
            padding: 50px 30px;
            border-radius: 40px;
            max-width: 520px;
            margin: 0 auto;
            position: relative;
        }

        .notif-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; position: absolute; top: 0; right: 0; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="min-h-screen">
    <div id="particles-js"></div>
    <div class="bg-dots"></div>

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-4">
             <!-- قائمة التنبيهات المصلحة -->
             <div class="relative group cursor-pointer user-nav">
                <div class="bg-white/5 p-3 rounded-2xl hover:bg-white/10 transition">
                    <span class="text-xl">🔔</span>
                    <div id="notifDot" class="notif-dot" style="display: none;"></div>
                </div>
                <!-- Dropdown يفتح لليسار -->
                <div class="dropdown-menu">
                    <p class="text-[10px] text-gray-500 font-bold mb-4 border-b border-white/5 pb-2">التنبيهات</p>
                    <div id="notifList" class="space-y-2 max-h-60 overflow-y-auto">
                        <p class="text-[9px] text-center text-gray-600">لا توجد تنبيهات جديدة</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-2xl font-black text-yellow-500 tracking-tighter">🛡️ وساطة <span class="text-[10px] opacity-30">V10</span></div>

        <div id="userInfoPlaceholder" class="flex items-center gap-3">
            <!-- سيتم حقن معلومات المستخدم هنا -->
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-24 text-center px-4 relative z-10">
        <h1 class="text-6xl font-black mb-16 leading-tight">تأمين المعاملات <br><span class="text-yellow-500">بالذكاء البرمجي</span></h1>
        
        <!-- المحفظة المركزية -->
        <div id="walletBox" class="hidden mb-16">
            <div class="wallet-center-card">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-4">محفظة وساطة المعتمدة</p>
                <div class="flex items-center justify-center gap-3 mb-10">
                    <span class="text-7xl font-black text-yellow-500 tracking-tighter" id="mainBal">0.00</span>
                    <span class="text-2xl text-gray-600 font-bold">SAR</span>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="alert('يرجى فتح تذكرة لتفعيل الإيداع')" class="bg-yellow-500 text-black py-4 rounded-2xl font-black text-xs hover:scale-105 transition shadow-lg shadow-yellow-500/20">إيداع</button>
                    <button class="bg-white/5 py-4 rounded-2xl font-bold text-xs hover:bg-white/10 transition">سحب</button>
                    <button class="bg-white/5 py-4 rounded-2xl font-bold text-xs hover:bg-white/10 transition">السجل</button>
                </div>
            </div>
        </div>

        <button onclick="location.href='ticket.html'" class="bg-yellow-500 text-black px-12 py-5 rounded-[2.5rem] font-black text-2xl hover:scale-105 transition">فتح تذكرة وساطة</button>
        
        <!-- قسم الضمان -->
        <div class="mt-40 grid md:grid-cols-2 gap-16 items-center text-right py-20 border-t border-white/5">
            <div>
                <h2 class="text-4xl font-black text-yellow-500 mb-6">ضمانك وأمانك 🤝</h2>
                <p class="text-gray-400 text-lg leading-relaxed">
                    من خلال "وساطة v10"، نضمن لك حماية كاملة من عمليات الاحتيال وتشفير بياناتك المالية. محفظتنا المعتمدة تضمن وصول كل هللة إلى صاحبها.
                </p>
            </div>
            <img src="wsath.png" class="w-full drop-shadow-[0_0_80px_rgba(234,179,8,0.1)] rounded-[3rem]">
        </div>
    </nav>

    <script>
        const firebaseConfig = { databaseURL: "https://wasata-af6ac-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const user = JSON.parse(localStorage.getItem('wasata_session'));

        function init() {
            const authHole = document.getElementById('userInfoPlaceholder');
            if(user) {
                document.getElementById('walletBox').classList.remove('hidden');
                
                // حقن معلومات المستخدم مع القائمة المنسدلة المصلحة
                authHole.innerHTML = `
                    <div class="relative user-nav cursor-pointer">
                        <div class="bg-white/5 border border-white/10 px-5 py-2.5 rounded-xl text-xs font-black hover:bg-white/10 transition">
                            ${user.email.split('@')[0]} ▼
                        </div>
                        <div class="dropdown-menu">
                            ${user.role === 'admin' ? '<button onclick="location.href=\'admin.html\'" class="text-yellow-500 font-bold block w-full py-3 border-b border-white/5 text-right">لوحة الإدارة ⚙️</button>' : ''}
                            <button onclick="location.href='ticket.html'" class="text-white block w-full py-3 border-b border-white/5 text-right">تذاكري 🎫</button>
                            <button onclick="logout()" class="text-red-500 block w-full py-3 text-right">تسجيل الخروج 🚪</button>
                        </div>
                    </div>
                `;
                loadWallet();
            } else {
                authHole.innerHTML = `<button onclick="location.href='login.html'" class="bg-yellow-500 text-black px-6 py-2 rounded-xl font-black">تسجيل الدخول</button>`;
            }
        }

        function loadWallet() {
            const uKey = user.email.replace(/\./g, '_');
            db.ref('wallets/' + uKey).on('value', snap => {
                document.getElementById('mainBal').innerText = (snap.val()?.balance || 0).toFixed(2);
            });
        }

        function logout() { localStorage.removeItem('wasata_session'); location.reload(); }
        
        particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#eab308" }, "opacity": { "value": 0.1 }, "size": { "value": 2 }, "line_linked": { "enable": true, "distance": 150, "color": "#eab308", "opacity": 0.05 } } });
        init();
    </script>
</body>
</html>
